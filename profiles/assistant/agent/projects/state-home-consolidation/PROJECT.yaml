id: state-home-consolidation
createdAt: 2026-03-14T19:04:25.000Z
updatedAt: 2026-03-14T21:22:00.000Z
title: Consolidate personal-agent state under one home
description: >-
  Move mutable personal-agent state out of the repo into a single state home rooted at
  ~/.local/state/personal-agent, with clear shared-vs-local boundaries and first-class
  space for profile projects.
summary: >-
  State-home consolidation now includes git-based automatic cross-machine sync: shared profile
  resources moved into state, syncable data grouped under `~/.local/state/personal-agent/sync`,
  daemon auto-sync enabled, and CLI setup/status/run workflows in place.
status: in_progress
blockers: []
currentFocus: >-
  Monitor sync reliability over real multi-machine use and tighten edge-case conflict handling
  after observing real-world conflict patterns.
recentProgress:
  - Moved syncable state into `~/.local/state/personal-agent/sync` and wired compatibility symlinks for `profiles`, `pi-agent`, and `config/config.json`.
  - Seeded `profiles/shared/agent` into state so shared defaults are fully state-backed instead of repo-backed.
  - Added daemon `sync` module with periodic git add/commit/fetch/merge/push loop and conflict-triggered resolver run kickoff.
  - Added `pa sync` CLI (`status|setup|run`) supporting fresh init and bootstrap from an existing remote repo.
  - Configured and validated live sync repo at `~/.local/state/personal-agent/sync` with daemon auto-sync enabled.
plan:
  milestones: []
  tasks:
    - id: unify-path-resolution
      status: completed
      title: Replace hardcoded config/state paths with one state-home resolver.
    - id: add-projects-space
      status: completed
      title: Ensure shared state layout includes profiles/<profile>/agent/projects.
    - id: migration-runbook
      status: completed
      title: Provide a one-time migration script and validation checklist.
    - id: state-backed-shared-profile
      status: completed
      title: Move shared profile resources into state and stop relying on repo shared defaults.
    - id: daemon-git-auto-sync
      status: completed
      title: Add daemon-backed periodic git sync with conflict resolver handoff.
    - id: sync-cli-setup
      status: completed
      title: Add CLI flow to initialize/bootstrap sync repo and wire daemon config.
