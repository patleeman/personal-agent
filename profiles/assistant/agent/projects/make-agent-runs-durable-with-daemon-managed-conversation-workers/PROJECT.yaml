id: make-agent-runs-durable-with-daemon-managed-conversation-workers
createdAt: 2026-03-12T12:27:20.618Z
updatedAt: 2026-03-12T13:12:24.386Z
title: Durable conversation workers
description: Make all active agent runs durable by moving live conversations out of the UI server and into daemon-managed conversation workers that web and gateway clients can attach to.
repoRoot: /Users/patrick/workingdir/personal-agent
summary: The daemon will supervise one durable conversation worker per active session so agent runs survive UI restarts; the refined plan now locks in a sessionFile-keyed single-owner model, snapshot-first reconnects, and a web-first migration path before gateway adoption.
status: in_progress
blockers: []
currentFocus: Extract shared live-conversation types and start the daemon conversations supervisor/worker implementation for the web migration.
recentProgress:
  - Wrote a daemon conversation runtime design artifact covering the supervisor/worker model, single-owner rules, snapshot-first reconnects, and bounded event replay.
  - Decided to migrate the web live-session routes first while shaping the daemon API to support a later gateway controller migration.
