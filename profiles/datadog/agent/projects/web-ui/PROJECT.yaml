id: web-ui
createdAt: 2026-03-10T10:00:00.000Z
updatedAt: 2026-03-11T10:10:00.000Z
description: Make the web UI the primary inbox-first shell for local personal-agent work while staying aligned with the conversation, artifact, and activity model.
summary: The web shell is working and the right rail is now project-centric, but the durable work model still needs a cleaner project/task boundary and richer previews for related activity and artifacts.
status: in_progress
blockers:
  - The right rail still needs richer task, activity, and artifact previews to complete the durable work-context model.
currentFocus: Unify the project rail around one coherent project view backed by PROJECT.yaml.
recentProgress:
  - Built the web shell with inbox, conversation, project, task, and memory routes.
  - Added live Pi session create, resume, stream, and fork flows.
  - Added durable conversation ↔ project links in the context rail.
  - Reworked the project rail to focus on one coherent project object.
plan:
  currentMilestoneId: unified-project-model
  milestones:
    - id: shell-foundation
      title: Build the base inbox-first web shell
      status: completed
      summary: Routing, core surfaces, profile switching, and live session support are in place.
    - id: unified-project-model
      title: Align the rail and project page around one project model
      status: in_progress
      summary: Treat the project as one object with milestones and lightweight tasks in PROJECT.yaml.
    - id: richer-previews
      title: Add richer task, activity, and artifact previews
      status: pending
      summary: Surface the most useful related durable context without turning the rail into a project-management tool.
    - id: polish
      title: Polish the inbox-first workflow
      status: pending
      summary: Keep the shell fast to scan, easy to resume, and strong on continuity.
