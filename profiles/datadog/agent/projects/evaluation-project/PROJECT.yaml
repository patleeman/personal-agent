id: evaluation-project
createdAt: 2026-03-13T13:48:56.443Z
updatedAt: 2026-03-13T18:12:30.000Z
title: Evaluation Project
description: Figuring out how evals work for agents.
repoRoot: /Users/patrickc.lee/dd
summary: First semantic-search scout run completed on live assistant_api traces; strongest early signal is tool-output truncation, but ingestion attrition is currently too high for reliable prevalence estimates.
status: in_progress
blockers:
  - Very high chatstore reconstruction attrition in org 2 (`unsupported_message_shape`) reduced 401 filtered candidate sessions to 3 usable sessions in the latest scout.
  - Need confirmation of data source/location per surface (MCP, NLQ, others) before cross-surface ingestion.
  - Taxonomy report productionization is in progress and may affect short-term reuse details.
  - Recurring production Tribunal runs require k8s cron wiring (values + monitors) after judges/experiments are validated.
currentFocus: Improve small-sample scout yield (message-shape compatibility + slightly wider sample window), then rerun to produce a more representative semantic-search hypothesis shortlist.
recentProgress:
  - Completed `semantic-search-scout-small` v4 ad-hoc run successfully and wrote results to `/tmp/tribunal-semantic-search-scout-small-v4.json`.
  - Confirmed runtime funnel from logs; 420 initial stubs -> 401 after excluded users -> 3 loaded sessions.
  - Quantified skipped sessions in this run; 398 `unsupported_message_shape` and 5 `conversation_not_found`.
  - First scout signal shows `truncation_detected` true in 2/3 executed sessions; one session also showed multiple implicit disapproval turns.
  - Local resilience patch prevented hard-fail and allowed run completion by skipping unsupported message shapes.
  - Captured source-backed Tribunal architecture and scheduling details in project notes for reuse.
