id: durable-background-runs-without-tmux
createdAt: 2026-03-12T18:43:58.967Z
updatedAt: 2026-03-12T22:53:32.503Z
title: Durable background runs without tmux
description: Replace tmux-based local background orchestration with a daemon-backed durable runs engine. Background work should survive restarts by resuming or rerunning from durable checkpoints and run state, not by keeping processes alive. V1 explicitly excludes mid-token continuation, mid-command shell continuation, and exactly-once tool execution.
repoRoot: /Users/patrickc.lee/personal/personal-agent
summary: Build a durable runs substrate in the daemon, move scheduled/background work onto it, adopt the same recovery model for live conversations, and remove tmux as a first-class local orchestration feature.
status: in_progress
blockers: []
currentFocus: Finish replacing tmux-first user-facing surfaces with durable-run inspection and recovery UX, then turn to the remaining live-conversation migration gaps.
recentProgress:
  - Added a web Runs page with `/runs` and `/runs/:id` routes, sidebar navigation, durable-run detail/log inspection, and task-run-now navigation into the new run detail flow.
  - Extended web client types/API wiring for durable runs and added a dedicated rail width preference for the new runs route.
  - Updated CLI/docs positioning so `pa runs` is documented as the main inspection surface for durable background work while tmux remains legacy/manual for now.
