<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Automations</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #eef1f7;
        --text: #171b2a;
        --muted: #68708a;
        --line: #c8cfdd;
        --surface: rgba(255, 255, 255, 0.38);
        --accent: #5f75ff;
        --danger: #b42318;
        --success: #1f7a4d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #181b28;
          --text: #e9edf8;
          --muted: #9ca5c3;
          --line: #30384d;
          --surface: rgba(255, 255, 255, 0.04);
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font:
          13px/1.5 Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
      .shell {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 34px 56px;
      }
      .hero,
      .editor-head,
      .list-head,
      .row-main,
      .row-actions,
      .form-actions {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .hero {
        padding-bottom: 28px;
        border-bottom: 1px solid var(--line);
      }
      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 11px;
        font-weight: 700;
      }
      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }
      h1 {
        margin-bottom: 6px;
        font-size: 34px;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }
      h2 {
        margin-bottom: 0;
        font-size: 18px;
      }
      h3 {
        margin-bottom: 4px;
        font-size: 15px;
      }
      .lede,
      .meta {
        color: var(--muted);
      }
      .button {
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 7px 11px;
        background: transparent;
        color: var(--text);
        font: inherit;
        cursor: pointer;
      }
      .button:hover {
        border-color: var(--accent);
      }
      .button.primary {
        border-color: color-mix(in srgb, var(--accent), var(--line) 45%);
        color: var(--text);
        background: color-mix(in srgb, var(--accent), transparent 88%);
      }
      .button.danger {
        color: var(--danger);
      }
      .button:disabled {
        cursor: default;
        opacity: 0.5;
      }
      .notice,
      .health,
      .editor {
        margin-top: 20px;
        border: 1px solid var(--line);
        background: var(--surface);
      }
      .notice,
      .health {
        padding: 13px 15px;
      }
      .notice.error {
        color: var(--danger);
      }
      .editor {
        padding: 18px;
      }
      .form {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
      }
      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 9px;
        background: color-mix(in srgb, var(--bg), white 8%);
        color: var(--text);
        font: inherit;
      }
      textarea {
        resize: vertical;
      }
      .check {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .check input {
        width: auto;
      }
      .content {
        margin-top: 30px;
      }
      .list-head {
        align-items: baseline;
        border-bottom: 1px solid var(--line);
        padding-bottom: 10px;
      }
      .tasks {
        display: grid;
      }
      .task {
        border-bottom: 1px solid var(--line);
        padding: 17px 0;
      }
      .row-main {
        align-items: center;
      }
      .row-actions {
        align-items: center;
        flex-wrap: wrap;
      }
      .task p {
        margin-bottom: 0;
      }
      .task-title {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        border: 1px solid var(--muted);
      }
      .dot.running {
        border-color: var(--accent);
        background: var(--accent);
      }
      .dot.disabled {
        opacity: 0.45;
      }
      .dot.failed {
        border-color: var(--danger);
        background: var(--danger);
      }
      .dot.success {
        border-color: var(--success);
        background: var(--success);
      }
      .prompt {
        margin-top: 8px;
        max-width: 680px;
        color: var(--muted);
        white-space: pre-wrap;
      }
      .details {
        margin-top: 7px;
        color: var(--muted);
        font-size: 12px;
      }
      .log {
        margin-top: 12px;
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        border-left: 2px solid var(--line);
        padding-left: 12px;
        color: var(--muted);
      }
      .empty {
        padding: 34px 0;
        color: var(--muted);
      }
      @media (max-width: 760px) {
        .shell {
          padding: 24px 18px;
        }
        .hero,
        .row-main {
          display: grid;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">System extension</p>
          <h1>Automations</h1>
          <p class="lede">Manage scheduled and conversation-bound agent work.</p>
        </div>
        <div class="hero-actions">
          <button id="refresh" class="button secondary" type="button">Refresh</button>
          <button id="new-task" class="button primary" type="button">New automation</button>
        </div>
      </header>

      <section id="notice" class="notice" hidden></section>
      <section id="health" class="health">Loading scheduler health…</section>

      <section id="editor" class="editor" hidden>
        <div class="editor-head">
          <div>
            <p class="eyebrow" id="editor-eyebrow">New automation</p>
            <h2 id="editor-title">Create automation</h2>
          </div>
          <button id="close-editor" class="button secondary" type="button">Close</button>
        </div>
        <form id="task-form" class="form">
          <label>Title <input name="title" required placeholder="Daily repo cleanup" /></label>
          <label>Prompt <textarea name="prompt" required rows="7" placeholder="Tell the agent exactly what to do."></textarea></label>
          <div class="grid">
            <label
              >Schedule type
              <select name="scheduleType">
                <option value="cron">Cron</option>
                <option value="at">Once</option>
              </select>
            </label>
            <label>Cron <input name="cron" placeholder="0 9 * * 1-5" /></label>
            <label>At <input name="at" placeholder="tomorrow 8pm" /></label>
            <label>Working directory <input name="cwd" placeholder="/path/to/repo" /></label>
            <label
              >Target
              <select name="targetType">
                <option value="background-agent">Background job</option>
                <option value="conversation">Conversation</option>
              </select>
            </label>
            <label
              >Thread mode
              <select name="threadMode">
                <option value="dedicated">Dedicated thread</option>
                <option value="existing">Existing thread</option>
                <option value="none">No thread</option>
              </select>
            </label>
            <label>Thread conversation ID <input name="threadConversationId" placeholder="optional" /></label>
            <label>Model <input name="model" placeholder="optional" /></label>
            <label>Timeout seconds <input name="timeoutSeconds" type="number" min="1" placeholder="optional" /></label>
            <label>Catch-up window seconds <input name="catchUpWindowSeconds" type="number" min="1" placeholder="optional" /></label>
          </div>
          <label class="check"><input name="enabled" type="checkbox" checked /> Enabled</label>
          <div class="form-actions">
            <button class="button primary" type="submit">Save automation</button>
            <button id="delete-task" class="button danger" type="button" hidden>Delete</button>
          </div>
        </form>
      </section>

      <section class="content">
        <div class="list-head">
          <h2>Current</h2>
          <span id="count" class="meta"></span>
        </div>
        <div id="tasks" class="tasks"></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
