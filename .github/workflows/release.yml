name: Desktop package smoke build

on:
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop release artifacts
        run: npm run desktop:dist
