<!doctype html>
<html class="pa-extension-page">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title><!-- Extension page title --></title>
    <link rel="stylesheet" href="page.css" />
  </head>
  <body>
    <main class="pa-shell">
      <header class="pa-hero">
        <div>
          <p class="pa-eyebrow"><!-- Extension eyebrow --></p>
          <h1><!-- Page title --></h1>
          <p class="pa-lede"><!-- One sentence summary. --></p>
        </div>
        <div class="pa-actions">
          <button class="pa-button" type="button">Secondary</button>
          <button class="pa-button pa-button-primary" type="button">Primary</button>
        </div>
      </header>

      <section class="pa-panel pa-stack">
        <div class="pa-section-heading">
          <h2><!-- Section title --></h2>
          <span class="pa-meta"><!-- Optional count/status --></span>
        </div>
        <div class="pa-empty">No items yet.</div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
