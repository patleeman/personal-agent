<!doctype html>
<html class="pa-extension-rail">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title><!-- Rail title --></title>
    <style>
      :root {
        --pa-bg: rgb(var(--color-base, 238 240 244));
        --pa-text: rgb(var(--color-primary, 22 26 40));
        --pa-muted: rgb(var(--color-secondary, 55 63 90));
        --pa-line: rgb(var(--color-border-subtle, 192 197 210));
        --pa-accent: rgb(var(--color-accent, 120 71 189));
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--pa-bg);
        color: var(--pa-text);
        font:
          12px/1.5 'DM Sans Variable',
          'DM Sans',
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
      main {
        padding: 12px;
        display: grid;
        gap: 12px;
      }
      .eyebrow {
        margin: 0 0 4px;
        color: var(--pa-accent);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 10px;
        font-weight: 700;
      }
      h1,
      p {
        margin-top: 0;
      }
      h1 {
        margin-bottom: 4px;
        font-size: 15px;
      }
      p {
        color: var(--pa-muted);
      }
      section {
        border-top: 1px solid var(--pa-line);
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow"><!-- Context --></p>
        <h1><!-- Rail title --></h1>
        <p><!-- One compact sentence. --></p>
      </header>
      <section><!-- Rail content --></section>
    </main>
    <script src="rail.js"></script>
  </body>
</html>
